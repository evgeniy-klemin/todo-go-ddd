version: "2"
sql:
  - engine: "sqlite"
    queries: "db/queries/sqlite/"
    schema: "db/schema/item.sql"
    gen:
      go:
        package: "sqlitedb"
        out: "internal/item/repository/sqlitedb"
  - engine: "mysql"
    queries: "db/queries/mysql/"
    schema: "db/schema/item.sql"
    gen:
      go:
        package: "mysqldb"
        out: "internal/item/repository/mysqldb"
